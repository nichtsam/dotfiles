- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- link:
    ~/.zshenv: zsh/zshenv
    ~/.zshrc: zsh/zshrc
    ~/.zlogin: zsh/zlogin

    ~/.gitconfig:
    ~/.gitignore_global:

    ~/.gnupg/:
      create: true
      mode: 0700
      glob: true
      path: gnupg/*

    ~/.aerospace.toml:
    ~/.config/nvim:
    ~/.config/starship.toml:
    ~/.config/wezterm/wezterm.lua:
    ~/.config/mise/config.toml: mise/config.toml
    ~/.config/lazygit/config.yml: lazygit.yaml

    ~/.npmrc:

- shell:
    - [git submodule update --init --recursive, Installing submodules]

    - command: ./setups/homebrew.zsh
      stdout: true
      stderr: true
    - command: ./setups/zsh.zsh
      stdout: true
      stderr: true
    - command: mise trust && mise install
      stdout: true
      stderr: true
    - command: ./setups/ssh.zsh
      stdout: true
      stderr: true
